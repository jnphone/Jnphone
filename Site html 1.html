              {Object.entries(data[brand].models[model]).map(([r, p]) => (
                <div key={r} className="rep-card" onClick={() => selectRepair(r, p)}
                  style={{ background: "#131829", border: "1px solid rgba(59,106,240,0.18)", borderRadius: 14, padding: "18px 22px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                  <div>
                    <div style={{ fontFamily: "Syne, sans-serif", fontWeight: 700, fontSize: "0.92rem", color: "#e8eaf6", marginBottom: 3 }}>{r}</div>
                    <div style={{ fontSize: "0.72rem", color: "#6b7a9e" }}>Pièce + main d'œuvre</div>
                  </div>
                  <div style={{ fontFamily: "Syne, sans-serif", fontWeight: 800, fontSize: "1.25rem", color: "#00d4ff", marginLeft: 14, whiteSpace: "nowrap" }}>{p}</div>
                </div>
              ))}
              <div className="rep-card" onClick={() => selectRepair("Autre panne", "Sur devis")}
                style={{ background: "#131829", border: "1px dashed rgba(59,106,240,0.25)", borderRadius: 14, padding: "18px 22px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <div>
                  <div style={{ fontFamily: "Syne, sans-serif", fontWeight: 700, fontSize: "0.92rem", color: "#6b7a9e", marginBottom: 3 }}>Autre panne</div>
                  <div style={{ fontSize: "0.72rem", color: "#3a4060" }}>Diagnostic gratuit</div>
                </div>
                <div style={{ fontFamily: "Syne, sans-serif", fontWeight: 800, fontSize: "1rem", color: "#6b7a9e", marginLeft: 14 }}>Sur devis</div>
              </div>
            </div>
          </div>
        )}

        {/* ÉTAPE 3 — RÉSERVATION */}
        {step === 3 && (
          <div>
            {submitted ? (
              <div style={{ textAlign: "center", padding: "50px 20px" }}>
                <div style={{ fontSize: "3.5rem", marginBottom: 18 }}>✅</div>
                <div style={{ fontFamily: "Syne, sans-serif", fontWeight: 800, fontSize: "1.5rem", color: "#00c97a", marginBottom: 10 }}>Demande envoyée !</div>
                <div style={{ color: "#6b7a9e", marginBottom: 28, fontSize: "0.92rem" }}>Nous vous contacterons très prochainement pour confirmer votre RDV.</div>
                <div style={{ background: "rgba(0,201,122,0.06)", border: "1px solid rgba(0,201,122,0.2)", borderRadius: 14, padding: "20px 28px", display: "inline-block", textAlign: "left", marginBottom: 28 }}>
                  <div style={{ fontSize: "0.72rem", color: "#6b7a9e", fontWeight: 700, textTransform: "uppercase", letterSpacing: 1, marginBottom: 10 }}>Récapitulatif</div>
                  {[["Appareil", `${brand} ${model}`], ["Réparation", repair], ["Prix estimé", price]].map(([k,v]) => (
                    <div key={k} style={{ display: "flex", gap: 12, padding: "5px 0", fontSize: "0.9rem" }}>
                      <span style={{ color: "#6b7a9e", minWidth: 90 }}>{k} :</span>
                      <span style={{ color: k === "Prix estimé" ? "#00d4ff" : "#e8eaf6", fontWeight: k === "Prix estimé" ? 700 : 400 }}>{v}</span>
                    </div>
                  ))}
                </div>
                <br />
                <button className="cta" onClick={reset} style={{ background: "#1a4fd6", color: "#fff", border: "none", padding: "13px 30px", borderRadius: 10, fontFamily: "Syne, sans-serif", fontWeight: 700, fontSize: "0.95rem", cursor: "pointer" }}>
                  Nouvelle réparation
                </button>
              </div>
            ) : (
              <div style={{ maxWidth: 640 }}>
                {/* Récap */}
                <div style={{ background: "rgba(0,212,255,0.05)", border: "1px solid rgba(0,212,255,0.18)", borderRadius: 14, padding: "18px 22px", marginBottom: 32, display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 10 }}>
                  <div>
                    <div style={{ fontSize: "0.7rem", color: "#6b7a9e", textTransform: "uppercase", letterSpacing: 1, marginBottom: 5 }}>Votre sélection</div>
                    <div style={{ fontFamily: "Syne, sans-serif", fontWeight: 700, fontSize: "0.95rem", color: "#fff" }}>
                      {brand && data[brand].icon} {model} — {repair}
                    </div>
                  </div>
                  <div style={{ fontFamily: "Syne, sans-serif", fontWeight: 800, fontSize: "1.7rem", color: "#00d4ff" }}>{price}</div>
                </div>

                <div style={{ fontFamily: "Syne, sans-serif", fontWeight: 800, fontSize: "1.1rem", color: "#fff", marginBottom: 22 }}>Vos coordonnées</div>

                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
                  {[{l:"Prénom & Nom *",k:"nom",t:"text",ph:"Jean Dupont"},{l:"Téléphone *",k:"tel",t:"tel",ph:"06 12 34 56 78"}].map(f => (
                    <div key={f.k} style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                      <label style={{ fontSize: "0.72rem", fontWeight: 700, color: "#6b7a9e", textTransform: "uppercase", letterSpacing: 1 }}>{f.l}</label>
                      <input type={f.t} placeholder={f.ph} value={form[f.k]} onChange={e => setForm(v => ({ ...v, [f.k]: e.target.value }))} style={inp} />
                    </div>
                  ))}
                  <div style={{ gridColumn: "1 / -1", display: "flex", flexDirection: "column", gap: 6 }}>
                    <label style={{ fontSize: "0.72rem", fontWeight: 700, color: "#6b7a9e", textTransform: "uppercase", letterSpacing: 1 }}>Informations complémentaires</label>
                    <textarea placeholder="Décrivez le problème si besoin, précisez votre modèle exact..." rows={3} value={form.info} onChange={e => setForm(v => ({ ...v, info: e.target.value }))} style={inp} />
                  </div>
                  <div style={{ gridColumn: "1 / -1" }}>
                    <button className="cta" onClick={handleSubmit} style={{ width: "100%", background: "#1a4fd6", color: "#fff", border: "none", padding: "15px", borderRadius: 10, fontFamily: "Syne, sans-serif", fontWeight: 700, fontSize: "1rem", cursor: "pointer" }}>
                      Confirmer ma demande de RDV ›
                    </button>
                    <div style={{ fontSize: "0.75rem", color: "#6b7a9e", textAlign: "center", marginTop: 10 }}>Nous vous contacterons dans les plus brefs délais pour confirmer</div>
                  </div>
                </div>
              </div>
            )}
          </div>
        )}
      </div>

      {/* CONTACT */}
      <div style={{ background: "#0c1a6e", padding: "22px 5%", display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: 14 }}>
        <div>
          <div style={{ fontFamily: "Syne, sans-serif", fontWeight: 800, color: "#fff", fontSize: "0.95rem" }}>J&N Phone – Muzillac (56)</div>
          <div style={{ color: "rgba(255,255,255,0.55)", fontSize: "0.78rem", marginTop: 3 }}>Lun–Sam · 9h–19h · SIRET 102 293 289 00017</div>
        </div>
        <div style={{ display: "flex", gap: 10 }}>
          <a href="tel:+33XXXXXXXXX" style={{ background: "rgba(255,255,255,0.12)", color: "#fff", padding: "8px 16px", borderRadius: 8, fontWeight: 600, fontSize: "0.82rem" }}>📞 Appeler</a>
          <a href="https://wa.me/33XXXXXXXXX" target="_blank" rel="noreferrer" style={{ background: "rgba(255,255,255,0.12)", color: "#fff", padding: "8px 16px", borderRadius: 8, fontWeight: 600, fontSize: "0.82rem" }}>💬 WhatsApp</a>
        </div>
      </div>
      <div style={{ background: "#050810", textAlign: "center", padding: "18px 5%", color: "#3a4060", fontSize: "0.75rem" }}>
        © 2026 J&N Phone – Tous droits réservés
      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
